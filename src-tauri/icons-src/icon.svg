<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="125%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16"/>
      <feOffset dy="12" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景:填满整块,不画圆角(iOS 系统统一裁 superellipse,避免双圆角) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <g filter="url(#cardShadow)">
    <!-- 日历卡片 -->
    <rect x="192" y="240" width="640" height="624" rx="72" fill="#FFFFFF"/>
    <!-- 顶部红色装饰条(含上半圆角) -->
    <path d="M192 312 Q192 240 264 240 L760 240 Q832 240 832 312 L832 376 L192 376 Z" fill="#EF4444"/>
    <!-- 装订环 -->
    <rect x="368" y="180" width="28" height="132" rx="14" fill="#475569"/>
    <rect x="628" y="180" width="28" height="132" rx="14" fill="#475569"/>
    <!-- 中央「日」字:东方日历美学,通用不过时 -->
    <text x="512" y="762" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif"
          font-size="372" font-weight="800" fill="#0F172A" text-anchor="middle">日</text>
  </g>
</svg>
